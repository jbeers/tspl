name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install BoxLang
        run: |
          curl -fsSL https://install.boxlang.io/ | bash
          echo "$HOME/.boxlang/bin" >> $GITHUB_PATH

      - name: Install TestBox
        run: |
          git clone --depth 1 https://github.com/Ortus-Solutions/TestBox.git testbox

      - name: Run tests
        run: |
          boxlang testbox/system/runners/BoxLangRunner.bx --directory=tests.specs
