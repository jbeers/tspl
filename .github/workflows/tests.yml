name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download BoxLang
        run: |
          wget -q https://downloads.ortussolutions.com/ortussolutions/boxlang/boxlang-latest-all.jar -O boxlang.jar

      - name: Install TestBox
        run: |
          git clone --depth 1 https://github.com/Ortus-Solutions/TestBox.git testbox

      - name: Run tests
        run: |
          java -jar boxlang.jar testbox/system/runners/BoxLangRunner.bx --directory=tests.specs
