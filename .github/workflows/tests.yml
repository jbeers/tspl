name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up CommandBox
        run: |
          curl -fsSL https://downloads.ortussolutions.com/ortussolutions/commandbox/6.1.0/commandbox-bin-6.1.0.zip -o commandbox.zip
          unzip -q commandbox.zip -d $HOME/.commandbox
          echo "$HOME/.commandbox" >> $GITHUB_PATH

      - name: Install TestBox
        run: |
          box install testbox

      - name: Run tests
        run: |
          box testbox run runner='testbox.system.runners.BoxLangRunner' directories='tests.specs'
